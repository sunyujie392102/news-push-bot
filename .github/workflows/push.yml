name: 每日新闻简报推送

on:
  # 定时触发：北京时间每天 07:00（UTC 23:00 前一天）
  schedule:
    - cron: "0 23 * * *"
  # 允许手动触发
  workflow_dispatch:

jobs:
  push:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 安装依赖
        run: |
          pip install requests beautifulsoup4 lxml -q

      - name: 运行推送脚本
        env:
          PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}
        run: python news_push.py
